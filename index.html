<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>DoomsDay</title>

  <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #111;
      font-family: 'Creepster', cursive;
      color: rgb(7, 41, 2);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;   /* horizontal center */
    }

    h1 {
      margin: 30px 0 0 0;
      font-size: 36px;
    }

    canvas {
      margin-top: 120px;   
      background: #222;
      border: 2px solid #4caf50;
      image-rendering: pixelated;
      display: block;
    }
  </style>
</head>

<body>
  <!-- <h1>DoomsDay</h1> -->
  
<div id="game-ui">
  <button id="loadBtn" class="gameBtn">Load</button>
  <button id="saveBtn" class="gameBtn">Save</button>
</div>

  <!-- Canvas is pushed DOWN independently -->
  <div id="gameContainer">
    <canvas id="gameWorld" width="640" height="640" tabindex="0"></canvas>
  </div>

 <script src="util.js"></script>
<script src="timer.js"></script>
<script src="assetmanager.js"></script>
<script src="gameengine.js"></script>
<script src="animator.js"></script>

<script src="./zombieSkins.js"></script>
<script src="zombie.js"></script>
<script src="beth.js"></script>
<script src="spawners.js"></script>   <!-- move up -->

<script src="tilemap.js"></script>    <!-- after spawners -->
<script src="player.js"></script>
<script src="itempickup.js"></script>
<script src="pickups.js"></script>

<script src="titlescreen.js"></script>
<script src="audio.js"></script>
<script src="healthbar.js"></script>
<script src="hud.js"></script>
<script src="notebook.js"></script>
<script src="letter.js"></script>
<script src="hintarrow.js"></script>
<script src="teleportprompt.js"></script>
<script src="./inventory.js"></script>
<script src="./main.js?v=7"></script>

</body>
</html>
